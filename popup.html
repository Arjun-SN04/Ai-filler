<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Filler AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-brand">
    <div class="brand-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
    </div>
    <span class="brand-name">Form Filler</span>
    <span class="brand-badge">AI</span>
  </div>
  <button class="btn-icon" id="settingsBtn" title="Settings">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </button>
</header>

<!-- ── Settings panel ── -->
<div class="settings-panel" id="settingsPanel" style="display:none">
  <div class="settings-field">
    <div class="settings-label">Groq API Key</div>
    <div class="settings-row">
      <input type="password" class="input-dark" id="apiKeyInput" placeholder="gsk_...">
      <button class="btn-save-key" id="saveKeyBtn">Save</button>
    </div>
    <a class="settings-link" href="https://console.groq.com/keys" target="_blank">Get your free API key →</a>
  </div>
  <div class="settings-field">
    <div class="settings-label">AI Model</div>
    <select class="select-dark" id="modelSelect">
      <option value="llama-3.1-8b-instant">Llama 3.1 8B Instant — Fastest</option>
      <option value="llama-3.3-70b-versatile">Llama 3.3 70B — Most Accurate</option>
      <option value="mixtral-8x7b-32768">Mixtral 8x7B — Balanced</option>
    </select>
  </div>
</div>

<!-- ── Main ── -->
<main class="main">

  <!-- Profile card -->
  <div class="profile-card">
    <div class="avatar" id="profileAvatar">?</div>
    <div class="profile-info">
      <div class="profile-name" id="profileName">No profile set up</div>
      <div class="profile-role" id="profileRole">Click Edit Profile to get started</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <span class="profile-pct" id="profilePct">0%</span>
  </div>

  <!-- Status -->
  <div class="status default" id="status">
    <svg class="status-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="statusIcon">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12" y2="16.5" stroke-width="2.5"></line>
    </svg>
    <span class="status-text" id="statusText">Navigate to a job form and click Auto Fill</span>
  </div>

  <!-- Fill button -->
  <button class="btn-fill" id="fillBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"></path>
      <path d="M19 18l.9 2.7 2.7.9-2.7.9L19 25l-.9-2.5L16 21.6l2.1-.8L19 18z"></path>
    </svg>
    Auto Fill Form
  </button>

  <!-- Action buttons -->
  <div class="actions">
    <button class="btn-ghost" id="profileBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      Profile
    </button>
    <button class="btn-ghost" id="trackBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="trackIcon">
        <circle cx="12" cy="12" r="2"></circle>
        <path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"></path>
      </svg>
      <span id="trackLabel">Track</span>
    </button>
    <button class="btn-ghost danger" id="clearBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
      Clear
    </button>
  </div>

  <!-- Missing fields panel (shown when AI can't fill some fields) -->
  <div class="missing-panel" id="missingPanel" style="display:none">
    <div class="missing-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      <span id="missingTitle">Fields need your input</span>
    </div>
    <div class="missing-list" id="missingList"></div>
    <div class="missing-footer">
      <button class="btn-apply" id="applyMissingBtn">Apply &amp; Save for Future</button>
      <button class="btn-skip" id="skipMissingBtn">Skip</button>
    </div>
  </div>

</main>

<script src="popup.js"></script>
</body>
</html>
